events {}  # Required block — handles connection processing (empty = use defaults)

http {

  upstream node_cluster {        # Define a group of backend servers called "node_cluster"
    server node1:3000;           # First Node container (Docker service name resolves to its IP)
    server node2:3000;           # Second Node container
    server node3:3000;           # Third Node container — round-robin is the default algorithm
  }

  server {
    listen 80;                   # NGINX listens for incoming traffic on port 80

    location / {                 # Match all incoming requests
      proxy_pass http://node_cluster;           # Forward requests to one of the Node containers
      proxy_set_header Host $host;              # Pass the original Host header to the Node server
      proxy_set_header X-Real-IP $remote_addr; # Pass the real client IP to the Node server
    }
  }
}
